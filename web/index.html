<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Cult Unbound 2026 Analytics</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Cult Unbound 2026 Analytics</h1>
      <p id="summaryText">Loading race data...</p>
    </header>

    <main class="layout">
      <section class="panel filters">
        <h2>Search & Filter</h2>
        <label>
          Athlete name
          <input id="nameSearch" type="text" placeholder="Type name..." />
        </label>
        <label>
          Bib no
          <input id="bibSearch" type="text" placeholder="Type bib..." />
        </label>
        <label>
          Event
          <select id="eventFilter">
            <option value="ALL">All events</option>
          </select>
        </label>
        <div class="filterActions">
          <button id="searchBtn" type="button">Search</button>
        </div>
      </section>

      <section class="panel results">
        <h2>Athletes</h2>
        <div id="listCount" class="muted"></div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Bib</th>
                <th>Name</th>
                <th>Event</th>
                <th>Net Time</th>
                <th>Category Rank</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
        <div class="zoneLeaderboardBlock">
          <h3>Zone-wise Ranking by Category</h3>
          <div class="zoneControls">
            <label>
              Category
              <select id="zoneCategoryFilter"></select>
            </label>
            <label>
              Zone
              <select id="zoneFilter"></select>
            </label>
          </div>
          <div id="zoneRankingCount" class="muted"></div>
          <div class="tableWrap zoneLeaderboardTable">
            <table>
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Name</th>
                  <th>Bib</th>
                  <th>Zone Time</th>
                </tr>
              </thead>
              <tbody id="zoneRankingBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="panel details">
        <h2>Category & Zone Comparison</h2>
        <div id="detailsContent" class="muted">
          Click an athlete to view performance comparisons.
        </div>
      </section>
    </main>

    <script type="module" src="./js/main.js?v=20260317f"></script>
  </body>
</html>
